  name: "CI: Lint (shell / nix)"
"on":
  pull_request: {}
  push:
    paths:
      - "**/*.sh"
      - "bash/bashrc"
      - "zsh/zshrc"
      - "**/*.nix"
      - ".github/workflows/dotfiles-ci.yml"
jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shellcheck: true
          - os: ubuntu-22.04-arm
            shellcheck: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
      - name: ShellCheck
        if: ${{ matrix.shellcheck }}
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
      - name: shfmt check
        run: |
          nix shell nixpkgs#shfmt --command shfmt -d .
      - name: Nix syntax check
        run: |
          find . -name "*.nix" ! -path "./.git/*" -print0 \
            | xargs -0 -I{} sh -c 'nix-instantiate --parse "$1" > /dev/null' _ {}
