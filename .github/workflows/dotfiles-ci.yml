name: "CI: Lint (shell / nix)"
"on":
  pull_request: {}
  push:
    paths:
      - "**/*.sh"
      - "**/*.bash"
      - "**/*.zsh"
      - "**/*.nix"
      - ".github/workflows/dotfiles-ci.yml"
jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@4.0.0
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
      - name: Enable flakes
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
      - name: shfmt check
        run: |
          nix shell nixpkgs#shfmt -c shfmt -d .
      - name: Nix syntax check
        run: |
          find . -name "*.nix" ! -path "./.git/*" \
            -exec nix-instantiate --parse {} \; > /dev/null
