name: "CI: Neovim plugin check (Nix)"

on:
  push:
    paths:
      - "nvim/**"
      - "flake.nix"
      - "flake.lock"
  pull_request:
    paths:
      - "nvim/**"
      - "flake.nix"
      - "flake.lock"

jobs:
  nvim-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Enable flakes
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      - name: Nix flake check
        run: nix flake check

      - name: Neovim headless startup check
        run: |
          nix run .#packages.x86_64-linux.neovim -- --headless +"quitall"

      - name: Neovim plugin health check
        run: |
          nix run .#neovim -- --headless +"checkhealth" +"quitall"

