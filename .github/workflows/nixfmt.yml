name: "CI: Lint (nixfmt)"
on:
  pull_request:
    paths:
      - "**/*.nix"
      - ".github/workflows/nixfmt.yml"
  push:
    paths:
      - "**/*.nix"
      - ".github/workflows/nixfmt.yml"

jobs:
  nixfmt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v21
      - name: nixfmt auto-fix
        run: |
          find . -name "*.nix" ! -path "./.git/*" -print0 \
            | xargs -0 nix shell nixpkgs#nixfmt-rfc-style --command nixfmt
      - name: Create PR if nixfmt made changes
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "style(nix): auto-format with nixfmt"
          title: "style(nix): auto-format with nixfmt"
          body: "nixfmt-rfc-style によるフォーマット自動修正"
          branch: "fix/nixfmt-auto-format"
          base: main
      - name: nixfmt diff check (PR時)
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code || (echo "nixfmtでフォーマットされていないファイルがあります。ローカルで nixfmt を実行してください。" && exit 1)
