name: "CI: Lint (fish)"
on:
  pull_request: {}
  push:
    paths:
      - "fish/**/*.fish"
      - ".github/workflows/fish-check.yml"
jobs:
  fish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v21
      - name: Fish syntax check
        run: |
          nix shell nixpkgs#fish --command sh -c '
            find fish/ -name "*.fish" -print0 | xargs -0 -I{} fish --no-execute {}
          '
      - name: fish_indent auto-format
        run: |
          nix shell nixpkgs#fish --command sh -c '
            find fish/ -name "*.fish" | xargs -I{} fish_indent -w {}
          '
      - name: Commit formatted files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(fish): auto-format with fish_indent"
