name: "CI: Spell check (typos)"
on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.nix"
      - "**/*.lua"
      - "**/*.fish"
      - "**/*.ts"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/typos.yml"
  push:
    paths:
      - "**/*.md"
      - "**/*.nix"
      - "**/*.lua"
      - "**/*.fish"
      - "**/*.ts"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/typos.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21
      - name: typos
        run: nix shell nixpkgs#typos --command typos
