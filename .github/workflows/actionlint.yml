name: "CI: Lint (actions)"
on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  push:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v21
      - name: actionlint
         run: |
           nix shell nixpkgs#actionlint --command actionlint
