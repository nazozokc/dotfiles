name: Update flake.lock (auto-merge)
on:
  schedule:
    - cron: "0 6 * * *" # 毎日 21:00 JST
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
      - name: Update flake.lock
        run: nix flake update
      - name: Check flake
        run: nix flake check
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          committer: "nazozo-updater-bot <flake-update-bot@users.noreply.github.com>"
          author: "nazozo-updater-bot <flake-update-bot@users.noreply.github.com>"
          body: |
            Automated flake.lock update.
            - nix flake update
            - nix flake check passed
          branch: flake-update
          delete-branch: true
          labels: |
            nix
            dependencies
            bot
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
