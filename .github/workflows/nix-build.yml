name: "CI: Nix build check"
on:
  pull_request:
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yml"
  push:
    branches: [main]
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: homeConfigurations.nazozo.activationPackage
          - os: macos-latest
            target: darwinConfigurations.nazozo.system  # flake.nixの実際のattribute名に合わせて
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v5
      - name: nix flake check
        run: nix flake check --no-build
      - name: Build config (dry-run)
        run: nix build .#${{ matrix.target }} --dry-run
