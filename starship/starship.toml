add_newline = true

# ----------------------------------------------------
# format
# ----------------------------------------------------
format = """
$directory\
$git_branch\
$git_status\
$direnv\
$nix_shell\
$nodejs\
$python\
$aws\
$fill\
$cmd_duration\
$time\
\n$character\
"""

# ----------------------------------------------------
# left module
# ----------------------------------------------------
[directory]
truncation_length = 6
truncation_symbol = '…/'
truncate_to_repo = false
home_symbol = '~'
read_only = '  '
format = """
[](fg:#7e9cd8)\
[$path]($style)\
[$read_only]($read_only_style)\
[](fg:#7e9cd8)\
"""
style = 'bold fg:#1f1f28 bg:#7e9cd8'
read_only_style = 'bold fg:#e46876 bg:#7e9cd8'

[git_branch]
symbol = ""
style = "fg:#957fb8 bg:#2d4f67"
format = """
[](fg:#2d4f67)\
[$symbol $branch]($style)\
"""

[git_status]
style = "fg:#957fb8 bg:#2d4f67"
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇡$ahead_count⇣$behind_count"
modified = "!$count"
untracked = "?$count"
staged = "+$count"
format = """
[$all_status$ahead_behind]($style)\
[](fg:#2d4f67)\
"""

[direnv]
disabled = false
format = """
[](fg:#6a9589)\
[$symbol$allowed]($style)\
[](fg:#6a9589)\
"""
style = "bold fg:#1f1f28 bg:#6a9589"

[nix_shell]
disabled = false
symbol = "❄️ "
impure_msg = "impure"
pure_msg = "pure"
format = """
[](fg:#658594)\
[$symbol$state]($style)\
[](fg:#658594)\
"""
style = "bold fg:#1f1f28 bg:#658594"

[nodejs]
symbol = " "
format = """
[](fg:#98bb6c)\
[$symbol$version]($style)\
[](fg:#98bb6c)\
"""
style = "bold fg:#1f1f28 bg:#98bb6c"

[python]
format = """
[](fg:#dca561)\
[$virtualenv]($style)\
[](fg:#dca561)\
"""
style = "bold fg:#1f1f28 bg:#dca561"

[fill]
symbol = '─'
style = 'fg:#54546d'

# ----------------------------------------------------
# right module
# ----------------------------------------------------
[cmd_duration]
min_time = 1
style = 'fg:#c0a36e'
format = "[ $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[ $time](fg:#717c7c)'

# ----------------------------------------------------
# prompt module
# ----------------------------------------------------
[character]
success_symbol = '[❯](bold fg:#98bb6c)'
error_symbol = '[❯](bold fg:#e46876)'
vimcmd_symbol = '[❮](bold fg:#957fb8)'

# ----------------------------------------------------
# AWS module
# ----------------------------------------------------
[aws]
format = '[$symbol $profile ]($style)'
symbol = "☁"
style = "bold fg:#dca561"
